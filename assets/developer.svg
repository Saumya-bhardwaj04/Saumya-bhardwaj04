<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Developer illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity=".25"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity=".12"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>

  <!-- subtle glow blobs -->
  <circle cx="250" cy="170" r="120" fill="#22c55e" opacity=".10" filter="url(#soft)"/>
  <circle cx="1000" cy="160" r="150" fill="#0ea5e9" opacity=".10" filter="url(#soft)"/>
  <circle cx="900" cy="560" r="170" fill="#a78bfa" opacity=".08" filter="url(#soft)"/>

  <!-- desk -->
  <rect x="140" y="520" width="920" height="26" rx="13" fill="#0f172a" opacity=".9"/>
  <rect x="180" y="546" width="840" height="22" rx="11" fill="#0b1020" opacity=".95"/>

  <!-- monitor -->
  <rect x="250" y="160" width="700" height="320" rx="22" fill="#0b1020" stroke="#334155" stroke-width="2"/>
  <rect x="278" y="190" width="644" height="240" rx="16" fill="url(#screen)" stroke="#1f2937" stroke-width="1"/>

  <!-- code lines -->
  <g opacity=".9">
    <rect x="310" y="220" width="220" height="16" rx="8" fill="#22c55e" opacity=".55"/>
    <rect x="550" y="220" width="130" height="16" rx="8" fill="#60a5fa" opacity=".55"/>
    <rect x="310" y="252" width="420" height="14" rx="7" fill="#94a3b8" opacity=".35"/>
    <rect x="310" y="280" width="360" height="14" rx="7" fill="#94a3b8" opacity=".28"/>
    <rect x="310" y="308" width="460" height="14" rx="7" fill="#94a3b8" opacity=".22"/>
    <rect x="310" y="336" width="260" height="14" rx="7" fill="#94a3b8" opacity=".30"/>
    <rect x="310" y="364" width="410" height="14" rx="7" fill="#94a3b8" opacity=".18"/>
  </g>

  <!-- monitor stand -->
  <rect x="560" y="480" width="80" height="46" rx="10" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="520" y="515" width="160" height="14" rx="7" fill="#0f172a"/>

  <!-- person (simple silhouette) -->
  <g>
    <!-- chair -->
    <rect x="160" y="430" width="200" height="120" rx="24" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <rect x="170" y="540" width="180" height="28" rx="14" fill="#0b1020"/>

    <!-- head -->
    <circle cx="430" cy="400" r="42" fill="#e5e7eb" opacity=".95"/>
    <path d="M395 392c18-28 55-38 79-14 0 0-5-32-40-32s-41 46-39 46z" fill="#111827" opacity=".9"/>

    <!-- body -->
    <path d="M380 520c0-70 26-110 78-110s82 40 82 110" fill="#1f2937" opacity=".95"/>
    <path d="M410 428c12 10 28 16 48 16s36-6 48-16v30c-14 12-30 18-48 18s-34-6-48-18z" fill="#111827" opacity=".9"/>

    <!-- arms -->
    <path d="M372 506c18-22 44-30 70-22" fill="none" stroke="#334155" stroke-width="14" stroke-linecap="round"/>
    <path d="M548 506c-18-22-44-30-70-22" fill="none" stroke="#334155" stroke-width="14" stroke-linecap="round"/>

    <!-- laptop -->
    <rect x="420" y="500" width="160" height="18" rx="9" fill="#0b1020"/>
    <rect x="440" y="462" width="120" height="44" rx="10" fill="#111827" stroke="#334155" stroke-width="2"/>
  </g>

  <!-- footer caption -->
  <g opacity=".75">
    <rect x="420" y="600" width="360" height="44" rx="22" fill="#0b1020"/>
    <text x="600" y="628" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" text-anchor="middle" fill="#cbd5e1">
      Building clean, scalable web apps
    </text>
  </g>
</svg>
